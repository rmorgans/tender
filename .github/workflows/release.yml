name: release

# Cut a release by pushing a version tag, e.g. `git tag v0.2.0 && git push --tags`.
# Builds a per-target binary, packages it as `agenttender-<target>.tar.gz` (the
# name `cargo binstall agenttender` expects — see [package.metadata.binstall] in
# Cargo.toml), attaches a SHA256 sidecar, attests build provenance (keyless SLSA),
# and uploads everything to the GitHub Release for the tag.
#
# NOTE: unvalidated until the first real tag. The org must allow Actions with
# `id-token: write` for the attestation step to succeed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload assets
  id-token: write # OIDC token for keyless attestation
  attestations: write # write build provenance

jobs:
  create-release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, zig: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, zig: true }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + target
        run: rustup update stable --no-self-update && rustup target add ${{ matrix.target }}

      - name: Install Zig (for cargo-zigbuild musl cross)
        if: matrix.zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        if: matrix.zig
        run: cargo install cargo-zigbuild --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.zig }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --bin tender
          else
            cargo build --release --target ${{ matrix.target }} --bin tender
          fi

      - name: Package
        id: pkg
        shell: bash
        run: |
          ext=""; [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          archive="agenttender-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" "tender${ext}"
          # sha256sum on Linux/Git-Bash; shasum on macOS.
          (sha256sum "$archive" || shasum -a 256 "$archive") > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ steps.pkg.outputs.archive }}

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "${{ steps.pkg.outputs.archive }}" \
            "${{ steps.pkg.outputs.archive }}.sha256" \
            --clobber
