name: ci

# Regression gate on every PR and push to main, across all supported platforms.
# The release workflow only *builds* on a tag; this is what actually blocks
# regressions — including native Windows (x64 + ARM64). Make these checks
# required via branch protection once they are green.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable --no-self-update
      - name: Test
        run: cargo test --locked --all-targets
      - name: Doc tests
        run: cargo test --locked --doc

  lint:
    name: lint (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + components
        run: rustup update stable --no-self-update && rustup component add rustfmt clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Package (locked)
        run: cargo package --locked --allow-dirty
